<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Chatbot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .chat-container {
            width: 90%;
            max-width: 800px;
            height: 80vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .chat-header h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .chat-header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .upload-section {
            padding: 20px;
            border-bottom: 1px solid #eee;
            background: #f8f9fa;
        }

        .upload-section h3 {
            margin-bottom: 15px;
            color: #333;
        }

        .file-input-container {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .file-input {
            flex: 1;
            padding: 10px;
            border: 2px dashed #667eea;
            border-radius: 8px;
            background: white;
            cursor: pointer;
        }

        .upload-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
        }

        .upload-btn:hover {
            background: #5a6fd8;
        }

        .upload-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #fafafa;
        }

        .message {
            margin-bottom: 20px;
            display: flex;
            align-items: flex-start;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.bot {
            justify-content: flex-start;
        }

        .message-content {
            max-width: 70%;
            padding: 15px 20px;
            border-radius: 20px;
            word-wrap: break-word;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 5px;
        }

        .message.bot .message-content {
            background: white;
            color: #333;
            border: 1px solid #e0e0e0;
            border-bottom-left-radius: 5px;
        }

        .message-sources {
            margin-top: 10px;
            font-size: 12px;
            color: #666;
        }

        .source-item {
            background: #f0f0f0;
            padding: 5px 10px;
            border-radius: 15px;
            margin: 2px;
            display: inline-block;
        }

        .chat-input-container {
            padding: 20px;
            background: white;
            border-top: 1px solid #eee;
        }

        .chat-input-form {
            display: flex;
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            outline: none;
            font-size: 16px;
        }

        .chat-input:focus {
            border-color: #667eea;
        }

        .send-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 500;
            min-width: 80px;
        }

        .send-btn:hover {
            background: #5a6fd8;
        }

        .send-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .rag-toggle {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .toggle-switch {
            position: relative;
            width: 50px;
            height: 25px;
            background: #ccc;
            border-radius: 25px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .toggle-switch.active {
            background: #667eea;
        }

        .toggle-slider {
            position: absolute;
            top: 2px;
            left: 2px;
            width: 21px;
            height: 21px;
            background: white;
            border-radius: 50%;
            transition: transform 0.3s;
        }

        .toggle-switch.active .toggle-slider {
            transform: translateX(25px);
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
            color: #666;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .stats {
            background: #e8f2ff;
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>🤖 RAG Chatbot</h1>
            <p>Upload documents and ask questions powered by Retrieval-Augmented Generation</p>
        </div>

        <div class="upload-section">
            <h3>📁 Upload Documents</h3>
            <div class="file-input-container">
                <input type="file" id="fileInput" class="file-input" multiple accept=".pdf,.docx,.txt">
                <button id="uploadBtn" class="upload-btn">Upload</button>
            </div>
            <div class="stats" id="statsContainer" style="display: none;">
                <strong>Knowledge Base:</strong> <span id="statsText">No documents uploaded</span>
            </div>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="message bot">
                <div class="message-content">
                    👋 Hello! I'm your RAG-powered chatbot. Upload some documents and ask me questions about them!
                </div>
            </div>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div>Thinking...</div>
        </div>

        <div class="chat-input-container">
            <div class="rag-toggle">
                <span>RAG Mode:</span>
                <div class="toggle-switch active" id="ragToggle">
                    <div class="toggle-slider"></div>
                </div>
                <span id="ragStatus">ON</span>
            </div>
            <form class="chat-input-form" id="chatForm">
                <input type="text" id="chatInput" class="chat-input" placeholder="Ask me anything about your documents..." autocomplete="off">
                <button type="submit" class="send-btn" id="sendBtn">Send</button>
            </form>
        </div>
    </div>

    <script>
        let isRagMode = true;

        // DOM elements
        const fileInput = document.getElementById('fileInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const chatForm = document.getElementById('chatForm');
        const sendBtn = document.getElementById('sendBtn');
        const loading = document.getElementById('loading');
        const ragToggle = document.getElementById('ragToggle');
        const ragStatus = document.getElementById('ragStatus');
        const statsContainer = document.getElementById('statsContainer');
        const statsText = document.getElementById('statsText');

        // RAG toggle functionality
        ragToggle.addEventListener('click', () => {
            isRagMode = !isRagMode;
            ragToggle.classList.toggle('active', isRagMode);
            ragStatus.textContent = isRagMode ? 'ON' : 'OFF';
        });

        // File upload functionality
        uploadBtn.addEventListener('click', async () => {
            const files = fileInput.files;
            if (files.length === 0) {
                alert('Please select files to upload');
                return;
            }

            uploadBtn.disabled = true;
            uploadBtn.textContent = 'Uploading...';

            const formData = new FormData();
            for (let file of files) {
                formData.append('files', file);
            }

            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();
                
                if (result.success) {
                    addMessage('bot', `✅ ${result.message}`);
                    await updateStats();
                } else {
                    addMessage('bot', `❌ ${result.message}`);
                }
            } catch (error) {
                addMessage('bot', `❌ Error uploading files: ${error.message}`);
            }

            uploadBtn.disabled = false;
            uploadBtn.textContent = 'Upload';
            fileInput.value = '';
        });

        // Chat functionality
        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const message = chatInput.value.trim();
            if (!message) return;

            // Add user message
            addMessage('user', message);
            chatInput.value = '';
            
            // Show loading
            showLoading(true);
            sendBtn.disabled = true;

            try {
                const formData = new FormData();
                formData.append('message', message);
                formData.append('use_rag', isRagMode);

                const response = await fetch('/chat', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();
                
                if (result.success) {
                    addMessage('bot', result.response, result.sources);
                } else {
                    addMessage('bot', `❌ ${result.response}`);
                }
            } catch (error) {
                addMessage('bot', `❌ Error: ${error.message}`);
            }

            showLoading(false);
            sendBtn.disabled = false;
        });

        // Helper functions
        function addMessage(sender, content, sources = []) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            
            let sourcesHtml = '';
            if (sources && sources.length > 0) {
                sourcesHtml = '<div class="message-sources">Sources: ';
                sources.forEach(source => {
                    sourcesHtml += `<span class="source-item">${source.filename} (${(source.similarity * 100).toFixed(1)}%)</span>`;
                });
                sourcesHtml += '</div>';
            }
            
            messageDiv.innerHTML = `
                <div class="message-content">
                    ${content}
                    ${sourcesHtml}
                </div>
            `;
            
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function showLoading(show) {
            loading.style.display = show ? 'block' : 'none';
            if (show) {
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }
        }

        async function updateStats() {
            try {
                const response = await fetch('/stats');
                const stats = await response.json();
                
                statsText.textContent = `${stats.total_documents} documents loaded`;
                statsContainer.style.display = 'block';
            } catch (error) {
                console.error('Error fetching stats:', error);
            }
        }

        // Load stats on page load
        updateStats();
    </script>
</body>
</html>
